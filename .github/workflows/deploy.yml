name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 혹은 master. 사용자님의 주 브랜치명에 맞춰 작동합니다.

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm ci
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite 빌드 폴더명
          branch: gh-pages # 정적 페이지가 배포될 브랜치명
